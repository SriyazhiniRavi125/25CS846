<!DOCTYPE html>
<html>
<head>
<title>Contact Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f0f8ff; }
.box { background:#fff; padding:20px; border-radius:10px; }
</style>
</head>

<body>

<div class="container mt-5 col-md-6 box">
<h3 class="text-center">Contact Us</h3>

<form>
<input class="form-control mb-2" placeholder="Name">
<input type="email" class="form-control mb-2" placeholder="Email">
<input class="form-control mb-2" placeholder="Phone">

<select class="form-select mb-2">
<option>Subject</option>
<option>Support</option>
</select>

<textarea class="form-control mb-2" placeholder="Message"></textarea>

<button class="btn btn-primary w-100">Submit</button>
</form>

</div>

</body>
</html>
